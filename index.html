<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>AiPHA — AIで、文明を加速する</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
<style>
  :root {
    --font-sf: "SF Pro Display", "SF Pro", -apple-system, BlinkMacSystemFont,
               "Helvetica Neue", "Segoe UI", "Arial", sans-serif;
    --font-jp: "SF Pro Display", "SF Pro", -apple-system, BlinkMacSystemFont,
               "Hiragino Sans", "Hiragino Kaku Gothic ProN",
               "Noto Sans JP", "Yu Gothic", sans-serif;

    --bg:      #EBEEEF;
    --ink:     #0E1220;
    --ink-sub: #3A3F55;
    --ink-dim: #7A7F95;

    --blue-bright: #2B55FF;
    --blue-deep:   #183D7D;
    --blue:        #1D3FD1;
    --blue-mid:    #306DB6;
    --blue-light:  #6B8CFF;
    --cyan-soft:   #8BB7FF;

    --ribbon-grey: #C6C9CD;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }
  html, body { height: 100%; }
  body {
    background: var(--bg);
    color: var(--ink);
    font-family: var(--font-sf);
    -webkit-font-smoothing: antialiased;
    -moz-osx-font-smoothing: grayscale;
    overflow-x: hidden;
  }

  /* ---------- Header ---------- */
  .nav {
    position: fixed; top: 0; left: 0; right: 0;
    z-index: 40;
    background: transparent;
    pointer-events: none;
  }
  .nav img {
    display: block;
    width: 100%;
    height: auto;
    user-select: none;
  }

  /* ---------- Hero ---------- */
  .hero {
    position: relative;
    min-height: 100vh;
    width: 100%;
    overflow: hidden;
    padding-top: clamp(80px, calc(100vw * 134 / 1440), 160px);
    isolation: isolate;
    background:
      radial-gradient(55% 45% at 92% 8%, rgba(139, 183, 255, 0.32) 0%, rgba(139,183,255,0) 70%),
      var(--bg);
  }

  /* Background ribbons + acceleration streaks */
  .ribbons {
    position: absolute;
    inset: 0;
    width: 100%; height: 100%;
    z-index: 1;
    pointer-events: none;
  }

  /* ---------- Hero content — left aligned ---------- */
  .hero-content {
    position: relative;
    z-index: 10;
    width: 100%;
    max-width: 1600px;
    margin: 0 auto;
    padding: clamp(40px, 8vh, 110px) clamp(32px, 6vw, 120px) 0;
    text-align: left;
  }

  /* English headline — main visual, 2 lines with hierarchy */
  .headline {
    font-family: var(--font-sf);
    font-weight: 600;
    line-height: 0.96;
    letter-spacing: -0.008em;
    color: var(--ink);
    text-shadow:
      0 0 24px rgba(235, 238, 239, 0.9),
      0 0 48px rgba(235, 238, 239, 0.55);
  }
  /* Line 1 (Think AI. Build AI.) — subordinate size */
  .headline .line-1 { font-size: clamp(36px, 4.6vw, 68px); }
  /* Line 2 (Accelerate Everything.) — emphasized, larger */
  .headline .line-2 { font-size: clamp(52px, 6.8vw, 100px); }
  .headline .line {
    display: block;
    overflow: hidden;
    white-space: nowrap;
    /* Room for descenders (g, y, p) so they don't get clipped by overflow:hidden */
    padding-bottom: 0.28em;
    margin-bottom: -0.32em;
  }
  .headline .line > span {
    display: inline-block;
    opacity: 0;
    transform: translateY(110%);
    animation: riseIn 1.1s cubic-bezier(.2,.85,.2,1) forwards;
    padding-bottom: 0.12em;
  }
  .headline .line-1 > span { animation-delay: 0.25s; }
  .headline .line-2 > span { animation-delay: 0.45s; }
  .headline .accent {
    background: linear-gradient(100deg, #2B55FF 0%, #6B8CFF 60%, #8BB7FF 100%);
    -webkit-background-clip: text;
    background-clip: text;
    color: transparent;
    letter-spacing: 0.002em;
  }
  @keyframes riseIn {
    to { opacity: 1; transform: translateY(0); }
  }

  /* Japanese main copy */
  .main-jp {
    margin-top: clamp(36px, 5vh, 72px);
    font-family: var(--font-jp);
    font-weight: 700;
    font-size: clamp(28px, 3.4vw, 54px);
    line-height: 1.3;
    letter-spacing: 0.04em;
    color: var(--ink);
    opacity: 0;
    transform: translateY(14px);
    animation: riseFade 1s cubic-bezier(.2,.8,.2,1) 0.95s forwards;
    /* Strong halo to guarantee readability if animation passes behind */
    text-shadow:
      0 0 18px rgba(235, 238, 239, 1),
      0 0 36px rgba(235, 238, 239, 0.95),
      0 2px 10px rgba(235, 238, 239, 0.9);
  }

  /* Sub description — width-matched to main copy (main ≈ 11em → sub ~22em,
     so sub font-size ≈ main * 11/22 ≈ main * 0.5) */
  .sub-jp {
    margin-top: clamp(12px, 1.6vh, 22px);
    font-family: var(--font-jp);
    font-weight: 500;
    font-size: clamp(14px, 1.72vw, 27px);
    letter-spacing: 0.04em;
    color: var(--ink-sub);
    opacity: 0;
    transform: translateY(14px);
    animation: riseFade 1s cubic-bezier(.2,.8,.2,1) 1.1s forwards;
    text-shadow:
      0 0 14px rgba(235, 238, 239, 1),
      0 0 28px rgba(235, 238, 239, 0.9);
  }

  @keyframes riseFade {
    to { opacity: 1; transform: translateY(0); }
  }

  /* Bottom-left copyright */
  .copyright {
    position: absolute;
    bottom: clamp(24px, 3.5vh, 44px);
    left: clamp(32px, 6vw, 120px);
    font-family: var(--font-sf);
    font-size: 12px;
    font-weight: 500;
    letter-spacing: 0.05em;
    color: var(--ink-dim);
    z-index: 10;
    opacity: 0;
    animation: fadeIn 1s ease 1.3s forwards;
  }

  /* Bottom-right scroll button */
  .scroll-btn {
    position: absolute;
    bottom: clamp(20px, 3vh, 40px);
    right: clamp(24px, 4vw, 64px);
    width: clamp(60px, 5.2vw, 80px);
    height: clamp(60px, 5.2vw, 80px);
    border-radius: clamp(14px, 1.2vw, 20px);
    background: rgba(255, 255, 255, 0.45);
    backdrop-filter: blur(12px);
    -webkit-backdrop-filter: blur(12px);
    border: 1px solid rgba(26, 26, 26, 0.12);
    display: flex;
    align-items: center;
    justify-content: center;
    cursor: pointer;
    transition: background 0.25s ease, transform 0.25s ease, border-color 0.25s ease;
    z-index: 10;
    opacity: 0;
    animation: fadeIn 1s ease 1.4s forwards, btnBob 3.2s ease-in-out 2.4s infinite;
  }
  .scroll-btn:hover {
    background: rgba(43, 85, 255, 0.14);
    border-color: rgba(43, 85, 255, 0.5);
    transform: translateY(-2px);
  }
  .scroll-btn svg {
    width: 40%; height: 40%;
    color: var(--ink);
    stroke-width: 1.6;
  }
  @keyframes btnBob {
    0%, 100% { translate: 0 0; }
    50%      { translate: 0 6px; }
  }

  @keyframes fadeIn { to { opacity: 1; } }

  /* Mobile */
  @media (max-width: 720px) {
    .hero-content { padding-left: 22px; padding-right: 22px; }
    .copyright { left: 22px; bottom: 20px; }
    .scroll-btn { right: 18px; bottom: 16px; width: 54px; height: 54px; }
    .headline { font-size: clamp(34px, 9vw, 54px); letter-spacing: -0.005em; }
    .main-jp { font-size: clamp(22px, 6vw, 32px); }
    .sub-jp { font-size: 18px; }
  }
</style>
</head>
<body>

<nav class="nav">
  <img src="header.svg" alt="AiPHA" />
</nav>

<section class="hero">

  <!-- Clean background: grey arc + diagonal acceleration curve with fast streaks -->
  <svg class="ribbons" viewBox="0 0 1440 900"
       preserveAspectRatio="xMidYMid slice" aria-hidden="true">
    <defs>
      <!-- Diagonal blue acceleration gradient -->
      <linearGradient id="accelBlue" x1="0%" y1="100%" x2="100%" y2="0%">
        <stop offset="0%"   stop-color="#183D7D" stop-opacity="0" />
        <stop offset="20%"  stop-color="#1D3FD1" stop-opacity="0.85" />
        <stop offset="55%"  stop-color="#2B55FF" stop-opacity="1" />
        <stop offset="85%"  stop-color="#8BB7FF" stop-opacity="0.75" />
        <stop offset="100%" stop-color="#FFFFFF" stop-opacity="0" />
      </linearGradient>
      <!-- Fast streak gradient (bright head, fading tail) -->
      <linearGradient id="streakHot" x1="0%" y1="100%" x2="100%" y2="0%">
        <stop offset="0%"   stop-color="#6B8CFF" stop-opacity="0" />
        <stop offset="75%"  stop-color="#FFFFFF" stop-opacity="1" />
        <stop offset="100%" stop-color="#FFFFFF" stop-opacity="0" />
      </linearGradient>
      <!-- Secondary thin blue streak -->
      <linearGradient id="streakBlue" x1="0%" y1="100%" x2="100%" y2="0%">
        <stop offset="0%"   stop-color="#2B55FF" stop-opacity="0" />
        <stop offset="70%"  stop-color="#2B55FF" stop-opacity="1" />
        <stop offset="100%" stop-color="#6B8CFF" stop-opacity="0" />
      </linearGradient>
    </defs>

    <!-- Soft grey base arc: static sweep in upper-right corner for depth -->
    <path d="M 1080 -60 Q 1350 60 1480 240 T 1680 620"
          stroke="var(--ribbon-grey)" stroke-width="100" fill="none"
          stroke-linecap="round" opacity="0.75" />


    <!-- DIAGONAL BLUE ACCELERATION ARC: lower-left → upper-right -->
    <path d="M 700 1100 Q 1000 830 1250 580 T 1680 -40"
          stroke="url(#accelBlue)" stroke-width="140" fill="none"
          stroke-linecap="round" opacity="1" />

    <!-- FAST STREAK 1: bright white head racing diagonally up-right -->
    <path d="M 700 1100 Q 1000 830 1250 580 T 1680 -40"
          stroke="url(#streakHot)" stroke-width="5" fill="none"
          stroke-linecap="round"
          stroke-dasharray="520 3200" stroke-dashoffset="3200">
      <animate attributeName="stroke-dashoffset"
        values="3200; -200"
        dur="1.8s"
        calcMode="spline"
        keyTimes="0; 1"
        keySplines="0.5 0 0.85 0.15"
        repeatCount="indefinite" />
    </path>

    <!-- FAST STREAK 2: thinner, staggered -->
    <path d="M 700 1100 Q 1000 830 1250 580 T 1680 -40"
          stroke="url(#streakHot)" stroke-width="2.5" fill="none"
          stroke-linecap="round"
          stroke-dasharray="340 3200" stroke-dashoffset="3200" opacity="0.8">
      <animate attributeName="stroke-dashoffset"
        values="3200; -200"
        dur="1.8s"
        begin="-0.9s"
        calcMode="spline"
        keyTimes="0; 1"
        keySplines="0.5 0 0.85 0.15"
        repeatCount="indefinite" />
    </path>

    <!-- FAST STREAK 3: thin trailing highlight -->
    <path d="M 700 1100 Q 1000 830 1250 580 T 1680 -40"
          stroke="url(#streakBlue)" stroke-width="1.5" fill="none"
          stroke-linecap="round"
          stroke-dasharray="220 3200" stroke-dashoffset="3200" opacity="0.75">
      <animate attributeName="stroke-dashoffset"
        values="3200; -200"
        dur="1.8s"
        begin="-1.35s"
        calcMode="spline"
        keyTimes="0; 1"
        keySplines="0.5 0 0.85 0.15"
        repeatCount="indefinite" />
    </path>

    <!-- Subtle secondary diagonal blue streak (offset path, different rhythm) -->
    <path d="M 1200 1160 Q 1440 920 1560 680 T 1720 200"
          stroke="url(#streakBlue)" stroke-width="2" fill="none"
          stroke-linecap="round"
          stroke-dasharray="180 2800" stroke-dashoffset="2800" opacity="0.55">
      <animate attributeName="stroke-dashoffset"
        values="2800; -200"
        dur="2.1s"
        begin="-0.5s"
        calcMode="spline"
        keyTimes="0; 1"
        keySplines="0.5 0 0.85 0.15"
        repeatCount="indefinite" />
    </path>
  </svg>

  <div class="hero-content">
    <h1 class="headline">
      <span class="line line-1"><span>Think AI. Build AI.</span></span>
      <span class="line line-2"><span class="accent">Accelerate Everything.</span></span>
    </h1>

    <p class="main-jp">AIで、文明を加速する。</p>
    <p class="sub-jp">AIエージェント開発のプロフェッショナル集団</p>
  </div>

  <button class="scroll-btn" aria-label="スクロールダウン">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor"
         stroke-linecap="round" stroke-linejoin="round">
      <line x1="12" y1="4" x2="12" y2="20" />
      <polyline points="5 13 12 20 19 13" />
    </svg>
  </button>
</section>

</body>
</html>

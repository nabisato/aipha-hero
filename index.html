<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>AiPHA — AIで、文明を加速する</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
<style>
  :root {
    --font-sf: "SF Pro Display", "SF Pro", -apple-system, BlinkMacSystemFont,
               "Helvetica Neue", "Segoe UI", "Arial", sans-serif;
    --font-jp: "SF Pro Display", "SF Pro", -apple-system, BlinkMacSystemFont,
               "Hiragino Sans", "Hiragino Kaku Gothic ProN",
               "Noto Sans JP", "Yu Gothic", sans-serif;

    --bg:      #EBEEEF;
    --ink:     #0E1220;
    --ink-sub: #3A3F55;
    --ink-dim: #7A7F95;

    /* Primary brand blue — matches TOP page */
    --blue:        #1D3FD1;
    --blue-bright: #2B55FF;
    --blue-deep:   #183D7D;
    --blue-mid:    #306DB6;
    --blue-light:  #6B8CFF;
    --cyan-soft:   #8BB7FF;

    --ribbon-grey: #C6C9CD;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }
  html, body { height: 100%; }
  body {
    background: var(--bg);
    color: var(--ink);
    font-family: var(--font-sf);
    -webkit-font-smoothing: antialiased;
    -moz-osx-font-smoothing: grayscale;
    overflow-x: hidden;
  }

  /* ---------- Header (hidden for now) ---------- */
  .nav { display: none; }

  /* ---------- Hero ---------- */
  .hero {
    position: relative;
    min-height: 100vh;
    width: 100%;
    overflow: hidden;
    isolation: isolate;
    display: flex;
    align-items: center;
    justify-content: flex-start;
    background:
      radial-gradient(55% 45% at 92% 8%, rgba(139, 183, 255, 0.26) 0%, rgba(139,183,255,0) 70%),
      var(--bg);
  }

  /* Background ribbons + acceleration streaks */
  .ribbons {
    position: absolute;
    inset: 0;
    width: 100%; height: 100%;
    z-index: 1;
    pointer-events: none;
  }

  /* ---------- Hero content — left aligned, vertically centered ---------- */
  .hero-content {
    position: relative;
    z-index: 10;
    width: 100%;
    max-width: 1600px;
    margin: 0 auto;
    padding: 0 clamp(32px, 6vw, 120px);
    text-align: left;
  }

  /* English headline — main visual, 2 lines with hierarchy */
  .headline {
    font-family: var(--font-sf);
    font-weight: 600;
    line-height: 0.98;
    letter-spacing: -0.008em;
    color: var(--blue);
  }
  /* Line 1 (Think AI. Build AI.) — one step up, still smaller than line 2 */
  .headline .line-1 { font-size: clamp(44px, 5.6vw, 84px); }
  /* Line 2 (Accelerate Everything.) — emphasized, larger */
  .headline .line-2 { font-size: clamp(56px, 7.2vw, 108px); }
  .headline .line {
    display: block;
    overflow: hidden;
    white-space: nowrap;
    padding-bottom: 0.28em;
    margin-bottom: -0.32em;
  }
  .headline .line > span {
    display: inline-block;
    opacity: 0;
    transform: translateY(110%);
    animation: riseIn 1.1s cubic-bezier(.2,.85,.2,1) forwards;
    padding-bottom: 0.12em;
    /* Horizontal blue gradient for the English headline */
    background: linear-gradient(90deg, #306DB6 0%, #183D7D 100%);
    -webkit-background-clip: text;
    background-clip: text;
    color: transparent;
    /* Halo for readability over animated ribbons */
    filter:
      drop-shadow(0 0 18px rgba(235, 238, 239, 0.85))
      drop-shadow(0 0 36px rgba(235, 238, 239, 0.55));
  }
  .headline .line-1 > span { animation-delay: 0.25s; }
  .headline .line-2 > span { animation-delay: 0.45s; }
  .headline .accent { letter-spacing: 0.002em; }
  @keyframes riseIn {
    to { opacity: 1; transform: translateY(0); }
  }

  /* Japanese main copy */
  .main-jp {
    margin-top: clamp(36px, 5vh, 72px);
    font-family: var(--font-jp);
    font-weight: 700;
    font-size: clamp(28px, 3.4vw, 54px);
    line-height: 1.3;
    letter-spacing: 0.04em;
    color: var(--ink);
    opacity: 0;
    transform: translateY(14px);
    animation: riseFade 1s cubic-bezier(.2,.8,.2,1) 0.95s forwards;
    text-shadow:
      0 0 18px rgba(235, 238, 239, 1),
      0 0 36px rgba(235, 238, 239, 0.95),
      0 2px 10px rgba(235, 238, 239, 0.9);
  }

  /* Sub description — width-matched to main copy */
  .sub-jp {
    margin-top: clamp(12px, 1.6vh, 22px);
    font-family: var(--font-jp);
    font-weight: 500;
    font-size: clamp(14px, 1.72vw, 27px);
    letter-spacing: 0.04em;
    color: var(--ink-sub);
    opacity: 0;
    transform: translateY(14px);
    animation: riseFade 1s cubic-bezier(.2,.8,.2,1) 1.1s forwards;
    text-shadow:
      0 0 14px rgba(235, 238, 239, 1),
      0 0 28px rgba(235, 238, 239, 0.9);
  }

  @keyframes riseFade {
    to { opacity: 1; transform: translateY(0); }
  }

  /* Bottom-right scroll button */
  .scroll-btn {
    position: absolute;
    bottom: clamp(20px, 3vh, 40px);
    right: clamp(24px, 4vw, 64px);
    width: clamp(60px, 5.2vw, 80px);
    height: clamp(60px, 5.2vw, 80px);
    border-radius: clamp(14px, 1.2vw, 20px);
    background: rgba(255, 255, 255, 0.45);
    backdrop-filter: blur(12px);
    -webkit-backdrop-filter: blur(12px);
    border: 1px solid rgba(26, 26, 26, 0.12);
    display: flex;
    align-items: center;
    justify-content: center;
    cursor: pointer;
    transition: background 0.25s ease, transform 0.25s ease, border-color 0.25s ease;
    z-index: 10;
    opacity: 0;
    animation: fadeIn 1s ease 1.4s forwards, btnBob 3.2s ease-in-out 2.4s infinite;
  }
  .scroll-btn:hover {
    background: rgba(43, 85, 255, 0.14);
    border-color: rgba(43, 85, 255, 0.5);
    transform: translateY(-2px);
  }
  .scroll-btn svg {
    width: 40%; height: 40%;
    color: var(--ink);
    stroke-width: 1.6;
  }
  @keyframes btnBob {
    0%, 100% { translate: 0 0; }
    50%      { translate: 0 6px; }
  }

  @keyframes fadeIn { to { opacity: 1; } }

  /* Mobile */
  @media (max-width: 720px) {
    .hero-content { padding-left: 22px; padding-right: 22px; }
    .scroll-btn { right: 18px; bottom: 16px; width: 54px; height: 54px; }
    .headline .line-1 { font-size: clamp(36px, 9vw, 54px); }
    .headline .line-2 { font-size: clamp(44px, 11vw, 66px); }
    .main-jp { font-size: clamp(22px, 6vw, 32px); }
    .sub-jp { font-size: 16px; }
  }
</style>
</head>
<body>

<nav class="nav" aria-hidden="true"></nav>

<section class="hero">

  <!-- Background: dynamic ribbons that sweep across the entire FV -->
  <svg class="ribbons" viewBox="0 0 1440 900"
       preserveAspectRatio="xMidYMid slice" aria-hidden="true">
    <defs>
      <!-- Primary ribbon gradient — deep brand blue, fading at both ends -->
      <linearGradient id="ribbonMain" x1="0%" y1="100%" x2="100%" y2="0%">
        <stop offset="0%"   stop-color="#1D3FD1" stop-opacity="0" />
        <stop offset="12%"  stop-color="#1D3FD1" stop-opacity="0.85" />
        <stop offset="48%"  stop-color="#2B55FF" stop-opacity="1" />
        <stop offset="80%"  stop-color="#6B8CFF" stop-opacity="0.75" />
        <stop offset="100%" stop-color="#8BB7FF" stop-opacity="0" />
      </linearGradient>

      <!-- Secondary ribbon gradient — lighter blue overlay -->
      <linearGradient id="ribbonSecond" x1="0%" y1="100%" x2="100%" y2="0%">
        <stop offset="0%"   stop-color="#2B55FF" stop-opacity="0" />
        <stop offset="35%"  stop-color="#2B55FF" stop-opacity="0.55" />
        <stop offset="70%"  stop-color="#6B8CFF" stop-opacity="0.8" />
        <stop offset="100%" stop-color="#8BB7FF" stop-opacity="0" />
      </linearGradient>

      <!-- Fast streak gradient -->
      <linearGradient id="streakHot" x1="0%" y1="100%" x2="100%" y2="0%">
        <stop offset="0%"   stop-color="#6B8CFF" stop-opacity="0" />
        <stop offset="75%"  stop-color="#FFFFFF" stop-opacity="1" />
        <stop offset="100%" stop-color="#FFFFFF" stop-opacity="0" />
      </linearGradient>
    </defs>

    <!-- Static grey depth arc in upper-right corner -->
    <path d="M 1080 -60 Q 1350 60 1480 240 T 1680 620"
          stroke="var(--ribbon-grey)" stroke-width="100" fill="none"
          stroke-linecap="round" opacity="0.55" />

    <!-- MAIN RIBBON — spans full FV, animates by stroke-dashoffset to sweep across -->
    <path d="M -320 1120 Q 160 940 520 720 Q 880 510 1200 280 Q 1460 90 1760 -160"
          stroke="url(#ribbonMain)" stroke-width="170" fill="none"
          stroke-linecap="round"
          stroke-dasharray="2600 2600"
          stroke-dashoffset="2600">
      <animate attributeName="stroke-dashoffset"
        values="2600; -2600"
        dur="5.2s"
        calcMode="spline"
        keyTimes="0; 1"
        keySplines="0.42 0 0.58 1"
        repeatCount="indefinite" />
    </path>

    <!-- SECONDARY RIBBON — thinner, offset path & timing for layered depth -->
    <path d="M -260 1220 Q 260 1020 640 800 Q 1020 580 1340 360 Q 1560 200 1820 -40"
          stroke="url(#ribbonSecond)" stroke-width="78" fill="none"
          stroke-linecap="round" opacity="0.9"
          stroke-dasharray="2600 2600"
          stroke-dashoffset="2600">
      <animate attributeName="stroke-dashoffset"
        values="2600; -2600"
        dur="5.8s"
        begin="-2.6s"
        calcMode="spline"
        keyTimes="0; 1"
        keySplines="0.45 0.05 0.55 1"
        repeatCount="indefinite" />
    </path>

    <!-- TERTIARY SOFT RIBBON — subtle, slowest, deepest blue -->
    <path d="M -380 1020 Q 100 870 460 660 Q 820 440 1140 210 Q 1420 0 1700 -240"
          stroke="url(#ribbonSecond)" stroke-width="38" fill="none"
          stroke-linecap="round" opacity="0.6"
          stroke-dasharray="2600 2600"
          stroke-dashoffset="2600">
      <animate attributeName="stroke-dashoffset"
        values="2600; -2600"
        dur="6.6s"
        begin="-1.3s"
        calcMode="spline"
        keyTimes="0; 1"
        keySplines="0.45 0.05 0.55 1"
        repeatCount="indefinite" />
    </path>

    <!-- FAST STREAK on main ribbon path — extra speed feel -->
    <path d="M -320 1120 Q 160 940 520 720 Q 880 510 1200 280 Q 1460 90 1760 -160"
          stroke="url(#streakHot)" stroke-width="4" fill="none"
          stroke-linecap="round"
          stroke-dasharray="520 3200" stroke-dashoffset="3200">
      <animate attributeName="stroke-dashoffset"
        values="3200; -300"
        dur="1.9s"
        calcMode="spline"
        keyTimes="0; 1"
        keySplines="0.55 0 0.85 0.2"
        repeatCount="indefinite" />
    </path>

    <!-- FAST STREAK 2 -->
    <path d="M -320 1120 Q 160 940 520 720 Q 880 510 1200 280 Q 1460 90 1760 -160"
          stroke="url(#streakHot)" stroke-width="2" fill="none"
          stroke-linecap="round"
          stroke-dasharray="320 3200" stroke-dashoffset="3200" opacity="0.8">
      <animate attributeName="stroke-dashoffset"
        values="3200; -300"
        dur="1.9s"
        begin="-0.95s"
        calcMode="spline"
        keyTimes="0; 1"
        keySplines="0.55 0 0.85 0.2"
        repeatCount="indefinite" />
    </path>
  </svg>

  <div class="hero-content">
    <h1 class="headline">
      <span class="line line-1"><span>Think AI. Build AI.</span></span>
      <span class="line line-2"><span class="accent">Accelerate Everything.</span></span>
    </h1>

    <p class="main-jp">AIで、文明を加速する。</p>
    <p class="sub-jp">AIエージェント開発のプロフェッショナル集団</p>
  </div>

  <button class="scroll-btn" aria-label="スクロールダウン">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor"
         stroke-linecap="round" stroke-linejoin="round">
      <line x1="12" y1="4" x2="12" y2="20" />
      <polyline points="5 13 12 20 19 13" />
    </svg>
  </button>
</section>

</body>
</html>
